<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배달료 정산 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.wrap{width:100%;max-width:560px}
h2{font-size:20px;font-weight:500;color:#111;margin-bottom:1.5rem}
.period-label{font-size:13px;color:#888;margin-bottom:8px}
.table-wrap{border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1.25rem;background:#fff}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:#f9f9f9}
th{padding:10px 12px;font-size:13px;font-weight:500;color:#888;text-align:center}
th:first-child{text-align:left;width:115px}
td{padding:7px 10px;font-size:14px;border-top:1px solid #f0f0f0;text-align:right;color:#111}
td:first-child{text-align:left;font-size:13px}
td.sum-row{font-weight:500;background:#f9f9f9}
.date-cell{display:flex;align-items:center;gap:6px;font-size:13px}
.day-tag{font-size:11px;color:#aaa;white-space:nowrap}
.fmt-wrap{display:flex;align-items:center}
.fmt-wrap input[type=text]{width:100%;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:14px;text-align:right;background:#fff;color:#111}
.fmt-wrap input[type=text]:focus{outline:none;border-color:#888}
.first-date-input{width:82px;border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:14px;text-align:right;background:#fff;color:#111}
.first-date-input:focus{outline:none;border-color:#888}
.result-box{border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:1.25rem;background:#fff}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:14px;border-bottom:1px solid #f0f0f0}
.result-row:last-child{border-bottom:none}
.result-row .label{color:#888}
.result-row .value{font-weight:500;color:#111}
.result-row.total .value{color:#185FA5;font-size:16px}
.result-row.tax .value{color:#A32D2D}
.result-row.net .value{color:#0F6E56;font-size:16px}
.reset-btn{font-size:13px;color:#888;background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 18px;cursor:pointer}
.reset-btn:hover{background:#f5f5f5}
</style>
</head>
<body>
<div class="wrap">
  <h2>배달료 정산 계산기</h2>
  <div class="period-label" id="period-label">정산 기간: —</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="text-align:left">날짜</th>
          <th>건수</th>
          <th>배달료 합계 (원)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>
  <div class="result-box">
    <div class="result-row total"><span class="label">합계</span><span class="value" id="r-total">—</span></div>
    <div class="result-row tax"><span class="label">소득세 3.3%</span><span class="value" id="r-tax">—</span></div>
    <div class="result-row net"><span class="label">실 지급액</span><span class="value" id="r-net">—</span></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">초기화</button>
</div>
<script>
const DAYS_KO=['수','목','금','토','일','월','화'];
const state=Array.from({length:7},()=>({dateStr:'',count:'',fee:''}));

function roundHalf(n){return Math.floor(n)+(n-Math.floor(n)>=0.5?1:0);}
function rawNum(s){return parseFloat(String(s).replace(/,/g,''))||0;}
function fmt(n){return roundHalf(n).toLocaleString('ko-KR')+'원';}

function toDate(mmdd){
  if(!mmdd||mmdd.length!==4)return null;
  const year=new Date().getFullYear();
  const month=parseInt(mmdd.slice(0,2),10)-1,day=parseInt(mmdd.slice(2,4),10);
  if(isNaN(month)||isNaN(day))return null;
  return new Date(year,month,day);
}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function toMMDD(date){return String(date.getMonth()+1).padStart(2,'0')+String(date.getDate()).padStart(2,'0');}
function fillDatesFrom(s){const b=toDate(s);if(!b)return;for(let i=0;i<7;i++)state[i].dateStr=toMMDD(addDays(b,i));}

function updatePeriod(){
  const d=state.map(s=>s.dateStr).filter(d=>d);
  document.getElementById('period-label').textContent=d.length>=2?`정산 기간: ${d[0]} ~ ${d[d.length-1]}`:'정산 기간: —';
}

function makeFmtInput(i,key,value){
  const inp=document.createElement('input');
  inp.type='text';inp.inputMode='numeric';
  inp.value=value?parseInt(value).toLocaleString('ko-KR'):'';
  inp.placeholder='0';
  inp.addEventListener('focus',function(){this.value=state[i][key]===''?'':String(state[i][key]);});
  inp.addEventListener('input',function(){
    this.value=this.value.replace(/[^0-9]/g,'');
    state[i][key]=this.value;
    calcAll();
  });
  inp.addEventListener('blur',function(){
    const n=parseInt(String(state[i][key]).replace(/,/g,''));
    this.value=isNaN(n)||state[i][key]===''?'':n.toLocaleString('ko-KR');
  });
  return inp;
}

function render(){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  state.forEach((s,i)=>{
    const tr=document.createElement('tr');
    const tdDate=document.createElement('td');tdDate.style.paddingLeft='10px';
    if(i===0){
      const wrap=document.createElement('div');wrap.style.cssText='display:flex;align-items:center;gap:6px';
      const inp=document.createElement('input');inp.className='first-date-input';
      inp.type='text';inp.inputMode='numeric';inp.placeholder='예) 0408';inp.value=s.dateStr||'';
      inp.addEventListener('input',function(){
        this.value=this.value.replace(/[^0-9]/g,'').slice(0,4);
        if(this.value.length===4){fillDatesFrom(this.value);renderDatesOnly();updatePeriod();}
        else{state[0].dateStr=this.value;for(let j=1;j<7;j++)state[j].dateStr='';renderDatesOnly();updatePeriod();}
      });
      const tag=document.createElement('span');tag.className='day-tag';tag.textContent=`(${DAYS_KO[0]})`;
      wrap.appendChild(inp);wrap.appendChild(tag);tdDate.appendChild(wrap);
    }else{
      const dc=document.createElement('div');dc.className='date-cell';
      dc.innerHTML=s.dateStr
        ?`<span style="font-weight:500">${s.dateStr}</span><span class="day-tag">(${DAYS_KO[i]})</span>`
        :`<span style="color:#aaa">—</span><span class="day-tag">(${DAYS_KO[i]})</span>`;
      tdDate.appendChild(dc);
    }
    const tdCount=document.createElement('td');const wc=document.createElement('div');wc.className='fmt-wrap';wc.appendChild(makeFmtInput(i,'count',s.count));tdCount.appendChild(wc);
    const tdFee=document.createElement('td');const wf=document.createElement('div');wf.className='fmt-wrap';wf.appendChild(makeFmtInput(i,'fee',s.fee));tdFee.appendChild(wf);
    tr.appendChild(tdDate);tr.appendChild(tdCount);tr.appendChild(tdFee);
    tbody.appendChild(tr);
  });
  calcAll();updatePeriod();
}

function renderDatesOnly(){
  document.querySelectorAll('#tbody tr').forEach((tr,i)=>{
    if(i===0)return;
    const dc=tr.querySelector('.date-cell');if(!dc)return;
    dc.innerHTML=state[i].dateStr
      ?`<span style="font-weight:500">${state[i].dateStr}</span><span class="day-tag">(${DAYS_KO[i]})</span>`
      :`<span style="color:#aaa">—</span><span class="day-tag">(${DAYS_KO[i]})</span>`;
  });
}

function calcAll(){
  let tc=0,tf=0;
  state.forEach(s=>{tc+=rawNum(s.count);tf+=rawNum(s.fee);});
  const tax=roundHalf(tf*0.033);
  const net=tf-tax;
  document.getElementById('tfoot').innerHTML=`<tr>
    <td class="sum-row" style="text-align:left;font-size:13px">합계</td>
    <td class="sum-row">${tc>0?tc.toLocaleString('ko-KR'):'-'}</td>
    <td class="sum-row">${tf>0?fmt(tf):'-'}</td>
  </tr>`;
  if(tf>0){
    document.getElementById('r-total').textContent=fmt(tf);
    document.getElementById('r-tax').textContent=tax.toLocaleString('ko-KR')+'원';
    document.getElementById('r-net').textContent=net.toLocaleString('ko-KR')+'원';
  }else{
    ['r-total','r-tax','r-net'].forEach(id=>document.getElementById(id).textContent='—');
  }
}

function resetAll(){state.forEach(s=>{s.dateStr='';s.count='';s.fee='';});render();}
render();
</script>
</body>
</html>
